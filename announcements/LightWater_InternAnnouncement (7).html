<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

    margin: 0;
    padding: 0;
  }
  .card {
    width: 720px;
    height: 720px;
    background: #ffffff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;

    text-transform: uppercase;
    color: #6BBFB5;
    margin-bottom: 8px;
    text-align: center;
  }
  .headline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 34px;

    color: #1E3A5F;
    text-align: center;
    letter-spacing: -0.01em;
    margin-bottom: 28px;
  }
  .people {
    display: flex;
    gap: 48px;
    align-items: flex-start;
    justify-content: center;
    margin-bottom: 24px;
  }
  .person {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 230px;
  }

    display: block;
  }

    font-weight: 400;

    text-align: center;
    line-height: 1.2;
    margin-bottom: 3px;
  }
  .person-school {
    font-family: 'DM Sans', sans-serif;
    font-weight: 300;
    font-style: italic;
    font-size: 12px;
    color: #9A9A96;
    text-align: center;
    letter-spacing: 0.03em;
  }
  .rule {

    height: 1px;

    margin-bottom: 14px;
